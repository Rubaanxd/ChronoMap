<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoMap - Línea de Tiempo Operativa</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons (CDN) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2canvas (Para exportar a PNG) -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow: hidden; /* Previene scroll general de la página */
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .grab-cursor { cursor: grab; }
        .grabbing-cursor { cursor: grabbing !important; }
        .resize-x-cursor { cursor: col-resize; }
        
        /* Context Menu */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1000;
            min-width: 180px;
            padding: 4px;
        }
        .context-menu-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
        }
        .context-menu-item:hover {
            background-color: #f1f5f9;
        }
        .context-menu-item.danger:hover {
            background-color: #fee2e2;
            color: #dc2626;
        }
        .context-menu-divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 4px 0;
        }
        
        /* Sublane indicators */
        .sublane-divider {
            border-top: 1px dashed #e2e8f0;
        }
        
        /* Modal styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        /* Area background and label */
        .area-background {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.05;
        }
        .area-label {
            position: sticky;
            left: 12px;
            top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        /* Panel collapse */
        .panel-collapsed {
            width: 0 !important;
            min-width: 0 !important;
            overflow: hidden;
        }
        .collapse-btn {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 48px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 25;
            transition: all 0.2s;
        }
        .collapse-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
    </style>
</head>
<body class="flex flex-col h-screen text-slate-900 selection:bg-blue-100">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200/80 shrink-0 shadow-sm z-30">
        <div class="flex items-center space-x-3">
            <div class="p-2 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl shadow-inner shadow-blue-500/20 flex items-center justify-center">
                <i class="ph ph-clock text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight flex items-baseline">
                    ChronoMap
                </h1>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <input type="file" id="file-input" accept=".json" class="hidden" />
            <button onclick="document.getElementById('file-input').click()" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-lg transition-all flex items-center gap-2 text-sm font-medium" title="Importar">
                <i class="ph ph-folder-open text-lg"></i> <span class="hidden sm:inline">Importar</span>
            </button>
            <div class="w-px h-5 bg-slate-200 mx-1"></div>
            <button onclick="exportToJson()" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-lg transition-all flex items-center gap-2 text-sm font-medium" title="Exportar JSON">
                <i class="ph ph-braces text-lg"></i> <span class="hidden sm:inline">JSON</span>
            </button>
            <button onclick="exportToImage()" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-lg transition-all flex items-center gap-2 text-sm font-medium" title="Exportar PNG">
                <i class="ph ph-image text-lg"></i> <span class="hidden sm:inline">PNG</span>
            </button>
        </div>
    </header>

    <div class="flex items-center px-6 py-2 bg-white/50 backdrop-blur-sm border-b border-slate-200/50 shrink-0 space-x-4 z-20">
        <button onclick="addNode()" class="flex items-center space-x-2 px-4 py-1.5 bg-white border border-slate-200 shadow-sm hover:border-blue-400 hover:text-blue-600 text-slate-700 text-sm font-medium rounded-lg transition-all">
            <i class="ph ph-plus"></i>
            <span>Nueva Actividad</span>
        </button>
        <button onclick="clearCanvas()" class="flex items-center space-x-2 px-4 py-1.5 bg-white border border-red-200 shadow-sm hover:border-red-400 hover:text-red-600 text-red-500 text-sm font-medium rounded-lg transition-all">
            <i class="ph ph-broom"></i>
            <span>Limpiar</span>
        </button>
        <div class="w-px h-4 bg-slate-300"></div>
        <span class="text-xs text-slate-500 hidden sm:flex items-center">
            <i class="ph ph-dots-six-vertical mr-1 opacity-50"></i> Arrastra para mover • Usa los bordes para extender
        </span>
        <div class="flex-1"></div>
        
        <!-- Controles de Zoom -->
        <div class="flex items-center space-x-1 bg-white border border-slate-200 p-1 rounded-lg shadow-sm">
            <button onclick="changeZoom(-0.5)" class="p-1 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-md transition-colors" title="Alejar">
                <i class="ph ph-magnifying-glass-minus text-lg"></i>
            </button>
            <span id="zoom-label" class="text-xs font-semibold text-slate-600 w-12 text-center select-none font-mono">100%</span>
            <button onclick="changeZoom(0.5)" class="p-1 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-md transition-colors" title="Acercar">
                <i class="ph ph-magnifying-glass-plus text-lg"></i>
            </button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Panel Izquierdo: Áreas -->
        <div id="areas-panel" class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-20 shadow-[4px_0_12px_rgba(0,0,0,0.02)] transition-all duration-300 relative">
            <button id="collapse-panel-btn" class="collapse-btn" onclick="togglePanel()" title="Colapsar/Expandir panel">
                <i id="collapse-icon" class="ph ph-caret-left text-slate-500"></i>
            </button>
            <div class="h-10 border-b border-slate-100 bg-slate-50/50 flex items-center px-6">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <i class="ph ph-briefcase"></i> Áreas
                </span>
            </div>
            <div id="areas-container" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1">
                <!-- Las áreas se renderizan aquí -->
            </div>
        </div>

        <!-- Contenedor Timeline -->
        <div id="scroll-container" class="flex-1 overflow-auto bg-[#f8fafc] relative custom-scrollbar">
            <!-- Este ID es clave para la exportación a imagen -->
            <div id="timeline-wrapper" class="relative pb-20 bg-[#f8fafc]">
                <!-- Regla de tiempo (Ruler) -->
                <div id="time-ruler" class="h-10 border-b border-slate-200 bg-white sticky top-0 z-10 flex shadow-sm"></div>
                <!-- Líneas de cuadrícula -->
                <div id="grid-lines" class="absolute top-0 left-0 bottom-0 right-0 pointer-events-none flex"></div>
                <!-- Carriles y Nodos -->
                <div id="lanes-container" class="relative mt-3 px-3 space-y-1"></div>
            </div>
        </div>
    </div>

    <!-- Mensaje Toast (Reemplazo de Alert) -->
    <div id="toast-message" class="fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-xl font-medium text-sm transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2">
        <i class="ph ph-info text-lg text-blue-400"></i>
        <span id="toast-text">Mensaje</span>
    </div>

    <!-- Pantalla de Carga (Bloquea interacciones durante procesos pesados) -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4">
            <i class="ph ph-spinner-gap animate-spin text-blue-600 text-4xl mb-4"></i>
            <h3 class="text-lg font-bold text-slate-800 mb-1">Procesando</h3>
            <p id="loading-text" class="text-sm text-slate-500 text-center">Por favor espera...</p>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <!-- Se llena dinámicamente -->
    </div>

    <!-- Modal de Propiedades -->
    <div id="properties-modal-overlay" class="modal-overlay">
        <div class="modal">
            <div id="properties-modal-content">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div id="confirmation-modal-overlay" class="modal-overlay">
        <div class="modal" style="max-width: 400px;">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 id="confirmation-title" class="text-lg font-bold text-slate-800">Confirmar</h3>
                    <button onclick="closeConfirmationModal()" class="text-slate-400 hover:text-slate-700 transition-colors">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>
                <p id="confirmation-message" class="text-sm text-slate-600 mb-6">¿Estás seguro?</p>
                <div class="flex gap-3 justify-end">
                    <button onclick="closeConfirmationModal()" class="px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                        Cancelar
                    </button>
                    <button id="confirmation-confirm-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">
                        Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTES ---
        const TOTAL_MINUTES = 24 * 60; // 1440
        const SNAP_MINUTES = 15;

        // --- ESTADO GLOBAL ---
        let state = {
            areas: [],
            nodes: [],
            zoom: 2, // pixelsPerMinute
            selectedNodeId: null,
            copiedNode: null, // Para copiar/pegar
            isPanelCollapsed: false, // Estado del panel de áreas
            history: {
                past: [],
                future: [],
                maxSize: 50
            }
        };

        // Estado de Interacción (Drag & Drop)
        let interaction = null;

        // --- INICIALIZACIÓN ---
        function init() {
            loadData();
            setupEventListeners();
            renderAll();
        }

        function loadData() {
            const savedAreas = localStorage.getItem('chronomap_areas_vanilla');
            const savedNodes = localStorage.getItem('chronomap_nodes_vanilla');
            const savedZoom = localStorage.getItem('chronomap_zoom_vanilla');

            if (savedAreas) {
                state.areas = JSON.parse(savedAreas);
            } else {
                state.areas = [
                    { id: 'a1', name: 'Línea', color: '#3b82f6', order: 1 },
                    { id: 'a2', name: 'Batch', color: '#10b981', order: 2 },
                    { id: 'a3', name: 'BackOffice', color: '#8b5cf6', order: 3 }
                ];
            }

            if (savedNodes) {
                state.nodes = JSON.parse(savedNodes);
                // Asegurar que todos los nodos tengan sublane
                state.nodes.forEach(n => {
                    if (n.sublane === undefined) n.sublane = 0;
                });
            } else {
                state.nodes = [
                    { id: 'n1', name: 'Revisión matutina', startTime: 480, endTime: 540, areaId: 'a1', color: '#eff6ff', description: 'Revisión de métricas', customFields: [], sublane: 0 },
                    { id: 'n2', name: 'Proceso Batch', startTime: 600, endTime: 720, areaId: 'a2', color: '#ecfdf5', description: '', customFields: [{ id: 'cf1', key: 'Ticket', value: 'B-102' }], sublane: 0 }
                ];
            }

            if (savedZoom) state.zoom = parseFloat(savedZoom);
            
            const savedPanelState = localStorage.getItem('chronomap_panel_collapsed_vanilla');
            if (savedPanelState) state.isPanelCollapsed = savedPanelState === 'true';
        }

        function saveData() {
            localStorage.setItem('chronomap_areas_vanilla', JSON.stringify(state.areas));
            localStorage.setItem('chronomap_nodes_vanilla', JSON.stringify(state.nodes));
            localStorage.setItem('chronomap_zoom_vanilla', state.zoom.toString());
        }

        function formatTime(minutes) {
            const h = Math.floor(minutes / 60).toString().padStart(2, '0');
            const m = Math.floor(minutes % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function parseTime(timeString) {
            if(!timeString) return 0;
            const parts = timeString.split(':');
            const h = parseInt(parts[0], 10) || 0;
            const m = parseInt(parts[1], 10) || 0;
            return (h * 60) + m;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-message');
            document.getElementById('toast-text').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        function showLoading(msg) {
            document.getElementById('loading-text').innerText = msg || 'Cargando...';
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0', 'pointer-events-none');
        }

        // --- SISTEMA DE SUBCARRILES ---
        function calculateSublanes(areaId) {
            const nodesInArea = state.nodes.filter(n => n.areaId === areaId);
            if (nodesInArea.length === 0) return 1;

            // Separar nodos con posición manual vs automática
            const manualNodes = nodesInArea.filter(n => n.manualSublane === true);
            const autoNodes = nodesInArea.filter(n => !n.manualSublane);

            // Ordenar nodos automáticos por startTime, luego por endTime
            autoNodes.sort((a, b) => {
                if (a.startTime !== b.startTime) return a.startTime - b.startTime;
                return a.endTime - b.endTime;
            });

            // Inicializar subcarriles con nodos manuales
            const sublanes = [];
            manualNodes.forEach(node => {
                const sublaneIndex = node.sublane || 0;
                if (!sublanes[sublaneIndex]) sublanes[sublaneIndex] = [];
                sublanes[sublaneIndex].push(node);
            });
            
            // Asignar nodos automáticos
            autoNodes.forEach(node => {
                let assignedSublane = -1;
                
                // Buscar el primer subcarril donde NO haya colisión
                for (let i = 0; i < 100; i++) { // Máximo 100 subcarriles
                    if (!sublanes[i]) sublanes[i] = [];
                    
                    // Verificar si hay colisión con CUALQUIER nodo en este subcarril
                    const hasCollision = sublanes[i].some(existingNode => {
                        // Hay colisión si los rangos se solapan
                        return !(existingNode.endTime <= node.startTime || existingNode.startTime >= node.endTime);
                    });
                    
                    if (!hasCollision) {
                        assignedSublane = i;
                        sublanes[i].push(node);
                        break;
                    }
                }
                
                // Asignar subcarril al nodo
                if (assignedSublane !== -1) {
                    node.sublane = assignedSublane;
                } else {
                    // Fallback: asignar al final
                    node.sublane = sublanes.length;
                    sublanes.push([node]);
                }
            });

            // Compactar subcarriles vacíos
            const compactedSublanes = sublanes.filter(s => s && s.length > 0);
            return Math.max(compactedSublanes.length, 1);
        }

        function getAreaSublaneCount(areaId) {
            const nodesInArea = state.nodes.filter(n => n.areaId === areaId);
            if (nodesInArea.length === 0) return 1;
            return Math.max(...nodesInArea.map(n => n.sublane || 0)) + 1;
        }

        function renderAll() {
            document.getElementById('timeline-wrapper').style.width = `${TOTAL_MINUTES * state.zoom}px`;
            document.getElementById('zoom-label').innerText = `${Math.round(state.zoom * 50)}%`;
            
            // Aplicar estado del panel
            const panel = document.getElementById('areas-panel');
            const icon = document.getElementById('collapse-icon');
            if (state.isPanelCollapsed) {
                panel.classList.add('panel-collapsed');
                icon.className = 'ph ph-caret-right text-slate-500';
            } else {
                panel.classList.remove('panel-collapsed');
                icon.className = 'ph ph-caret-left text-slate-500';
            }
            
            renderAreas();
            renderRuler();
            renderGrid();
            renderTimeline();
            saveData();
        }

        function renderAreas() {
            const container = document.getElementById('areas-container');
            let html = '';
            
            state.areas.forEach(area => {
                html += `
                <div class="group flex items-center h-16 bg-white border border-slate-100 hover:border-slate-200 rounded-xl px-3 transition-all hover:shadow-sm">
                    <input type="color" value="${area.color}" onchange="updateAreaColor('${area.id}', this.value)" class="w-6 h-6 rounded-md mr-3 shrink-0 cursor-pointer border-0" title="Cambiar color" />
                    <input type="text" value="${area.name}" onchange="updateArea('${area.id}', this.value)" class="font-medium text-sm text-slate-700 bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-500 rounded px-1 w-full" />
                    <button onclick="removeArea('${area.id}')" class="opacity-0 group-hover:opacity-100 p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all shrink-0 ml-1" title="Eliminar Área">
                        <i class="ph ph-trash text-base"></i>
                    </button>
                </div>`;
            });
            
            html += `<button onclick="addArea()" class="w-full mt-2 py-3 text-sm text-slate-500 hover:text-blue-600 font-medium hover:bg-blue-50/50 rounded-xl border border-dashed border-slate-200 hover:border-blue-200 flex items-center justify-center transition-all">
                        <i class="ph ph-plus mr-1"></i> Añadir Área
                    </button>`;
            container.innerHTML = html;
        }

        function renderRuler() {
            const container = document.getElementById('time-ruler');
            let html = '';
            for (let i = 0; i < 24; i++) {
                let marks = '';
                if (state.zoom >= 1.5) marks += `<div class="absolute bottom-0 left-1/4 w-px h-1.5 bg-slate-200"></div>`;
                if (state.zoom >= 0.8) marks += `<div class="absolute bottom-0 left-2/4 w-px h-2.5 bg-slate-300"></div>`;
                if (state.zoom >= 1.5) marks += `<div class="absolute bottom-0 left-3/4 w-px h-1.5 bg-slate-200"></div>`;
                
                html += `
                <div class="h-full border-r border-slate-100 relative flex items-end px-1.5 pb-1.5" style="width: ${60 * state.zoom}px">
                    <span class="text-[10px] font-bold text-slate-400 select-none">${i.toString().padStart(2, '0')}:00</span>
                    ${marks}
                </div>`;
            }
            container.innerHTML = html;
        }

        function renderGrid() {
            const container = document.getElementById('grid-lines');
            let html = '';
            for (let i = 0; i < 24; i++) {
                html += `<div class="border-r border-slate-200/60 border-dashed h-full" style="width: ${60 * state.zoom}px"></div>`;
            }
            container.innerHTML = html;
        }

        function renderTimeline() {
            const container = document.getElementById('lanes-container');
            let html = '';
            
            state.areas.forEach(area => {
                // Calcular subcarriles automáticamente
                calculateSublanes(area.id);
                const sublaneCount = getAreaSublaneCount(area.id);
                const sublaneHeight = 60; // Altura de cada subcarril
                const areaHeight = sublaneCount * sublaneHeight + 16; // +16 para padding
                
                const nodesInArea = state.nodes.filter(n => n.areaId === area.id);
                let nodesHtml = nodesInArea.map(node => {
                    const width = (node.endTime - node.startTime) * state.zoom;
                    const left = node.startTime * state.zoom;
                    const isSelected = state.selectedNodeId === node.id;
                    const isInteracting = interaction && interaction.id === node.id;
                    
                    // Posicionamiento vertical basado en sublane
                    const sublane = node.sublane || 0;
                    const top = sublane * sublaneHeight + 8;
                    const height = sublaneHeight - 16;
                    
                    let classes = "absolute rounded-xl flex flex-col p-2.5 overflow-hidden transition-all duration-75 select-none group grab-cursor ";
                    if (isSelected) classes += "ring-2 ring-blue-500 ring-offset-1 shadow-md z-10 ";
                    else classes += "border border-slate-200/60 shadow-sm hover:shadow-md hover:border-slate-300 ";
                    if (isInteracting) classes += "opacity-90 scale-[1.02] shadow-xl z-20 grabbing-cursor";

                    let resizeHandles = '';
                    if (isSelected) {
                        resizeHandles = `
                        <div class="absolute left-0 top-0 bottom-0 w-3 resize-x-cursor hover:bg-blue-500/10 flex items-center justify-center group/handle" onmousedown="startInteraction(event, '${node.id}', 'resize-left')">
                            <div class="w-1 h-4 rounded-full bg-blue-400 opacity-0 group-hover/handle:opacity-100 transition-opacity"></div>
                        </div>
                        <div class="absolute right-0 top-0 bottom-0 w-3 resize-x-cursor hover:bg-blue-500/10 flex items-center justify-center group/handle" onmousedown="startInteraction(event, '${node.id}', 'resize-right')">
                            <div class="w-1 h-4 rounded-full bg-blue-400 opacity-0 group-hover/handle:opacity-100 transition-opacity"></div>
                        </div>`;
                    }

                    return `
                    <div id="node-${node.id}" class="${classes}" style="left: ${left}px; top: ${top}px; width: ${width}px; height: ${height}px; background-color: ${node.color || '#ffffff'}" onmousedown="startInteraction(event, '${node.id}', 'move')" onmouseup="handleNodeClick(event, '${node.id}')" oncontextmenu="showContextMenu(event, '${node.id}')">
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 pointer-events-none" style="background-color: ${area.color}"></div>
                        <div class="flex items-center justify-between mb-1 pointer-events-none pl-1">
                            <span class="text-xs font-bold text-slate-700 truncate pr-2">${node.name}</span>
                        </div>
                        <div class="flex items-center text-[10px] text-slate-500 font-medium pointer-events-none pl-1">
                            <i class="ph ph-clock mr-1 opacity-70"></i> ${formatTime(node.startTime)} - ${formatTime(node.endTime)}
                        </div>
                        ${resizeHandles}
                    </div>`;
                }).join('');

                // Generar divisores de subcarriles
                let sublanesDividers = '';
                for (let i = 1; i < sublaneCount; i++) {
                    const dividerTop = i * sublaneHeight + 8;
                    sublanesDividers += `<div class="absolute left-0 right-0 sublane-divider" style="top: ${dividerTop}px;"></div>`;
                }

                // Fondo de color del área
                const areaBackground = `<div class="area-background" style="background-color: ${area.color};"></div>`;
                
                // Etiqueta del área
                const areaLabel = `<div class="area-label" style="color: ${area.color};"><i class="ph-fill ph-circle" style="font-size: 8px;"></i>${area.name}</div>`;

                html += `<div class="relative rounded-xl border border-transparent hover:border-slate-200/50 transition-all" style="height: ${areaHeight}px; min-height: 76px;" data-area-id="${area.id}">${areaBackground}${areaLabel}${sublanesDividers}${nodesHtml}</div>`;
            });
            container.innerHTML = html;
        }

        // renderPropertiesPanel eliminado - ahora se usa modal

        function setupEventListeners() {
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
            document.getElementById('scroll-container').addEventListener('mousedown', (e) => {
                if (e.target.id === 'scroll-container' || e.target.id === 'timeline-wrapper') selectNode(null);
            });
            
            document.getElementById('file-input').addEventListener('change', importFromJson);
            
            // Copiar/Pegar con teclado
            document.addEventListener('keydown', handleKeyboard);
            
            // Cerrar menú contextual al hacer click fuera
            document.addEventListener('click', hideContextMenu);
            
            // Zoom con Ctrl+Scroll
            document.getElementById('scroll-container').addEventListener('wheel', handleZoomScroll, { passive: false });
            
            // Cerrar modal con click en overlay
            document.getElementById('properties-modal-overlay').addEventListener('click', (e) => {
                if (e.target.id === 'properties-modal-overlay') closePropertiesModal();
            });
        }

        function handleKeyboard(e) {
            // ESC - Cerrar modal
            if (e.key === 'Escape') {
                closePropertiesModal();
                closeConfirmationModal();
            }
            // Ctrl+C - Copiar
            if (e.ctrlKey && e.key === 'c' && state.selectedNodeId) {
                e.preventDefault();
                copyNode();
            }
            // Ctrl+V - Pegar
            if (e.ctrlKey && e.key === 'v' && state.copiedNode) {
                e.preventDefault();
                pasteNode();
            }
            // Delete - Eliminar
            if (e.key === 'Delete' && state.selectedNodeId) {
                e.preventDefault();
                deleteSelectedNode();
            }
        }

        function copyNode() {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            
            state.copiedNode = JSON.parse(JSON.stringify(node));
            showToast('✅ Actividad copiada');
        }

        function pasteNode() {
            if (!state.copiedNode) return;
            
            const newNode = JSON.parse(JSON.stringify(state.copiedNode));
            newNode.id = 'n' + Date.now();
            newNode.name = newNode.name + ' (Copia)';
            
            // Desplazar 15 minutos para evitar solapamiento exacto
            newNode.startTime += 15;
            newNode.endTime += 15;
            
            // Ajustar si se pasa del límite
            if (newNode.endTime > TOTAL_MINUTES) {
                const duration = newNode.endTime - newNode.startTime;
                newNode.endTime = TOTAL_MINUTES;
                newNode.startTime = TOTAL_MINUTES - duration;
            }
            
            state.nodes.push(newNode);
            state.selectedNodeId = newNode.id;
            renderAll();
            showToast('✅ Actividad pegada');
        }

        function duplicateNode(nodeId) {
            const node = state.nodes.find(n => n.id === nodeId);
            if (!node) return;
            
            const newNode = JSON.parse(JSON.stringify(node));
            newNode.id = 'n' + Date.now();
            newNode.name = newNode.name + ' (Duplicado)';
            newNode.startTime += 15;
            newNode.endTime += 15;
            
            if (newNode.endTime > TOTAL_MINUTES) {
                const duration = newNode.endTime - newNode.startTime;
                newNode.endTime = TOTAL_MINUTES;
                newNode.startTime = TOTAL_MINUTES - duration;
            }
            
            state.nodes.push(newNode);
            state.selectedNodeId = newNode.id;
            renderAll();
            showToast('✅ Actividad duplicada');
        }

                    </div>

                    <div class="grid grid-cols-2 gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100">

                            <button onclick="addCustomField()" class="text-[10px] font-bold text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors uppercase">+ Añadir</button>

        function closePropertiesModal() {

        // --- PANEL COLAPSABLE ---
        function togglePanel() {
            state.isPanelCollapsed = !state.isPanelCollapsed;
            localStorage.setItem('chronomap_panel_collapsed_vanilla', state.isPanelCollapsed.toString());
            renderAll();
        }

        // --- ZOOM CON SCROLL ---
        function handleZoomScroll(e) {
            if (!e.ctrlKey) return;
            
            e.preventDefault();
            
            const delta = -Math.sign(e.deltaY) * 0.2;
            let newZoom = state.zoom + delta;
            
            if (newZoom < 0.5) newZoom = 0.5;
            if (newZoom > 10) newZoom = 10;
            
            state.zoom = newZoom;
            renderAll();
        }

        // --- LIMPIAR LIENZO ---
        function clearCanvas() {
            if (state.nodes.length === 0) {
                showToast('📦 El lienzo ya está vacío');
                return;
            }
            
            showConfirmationModal(
                '¿Limpiar lienzo?',
                'Se eliminarán todas las actividades. Esta acción no se puede deshacer.',
                () => {
                    state.nodes = [];
                    state.selectedNodeId = null;
                    renderAll();
                    showToast('✅ Lienzo limpiado');
                }
            );
        }

        // --- MODAL DE CONFIRMACIÓN ---
        function showConfirmationModal(title, message, onConfirm) {
            document.getElementById('confirmation-title').innerText = title;
            document.getElementById('confirmation-message').innerText = message;
            
            const confirmBtn = document.getElementById('confirmation-confirm-btn');
            confirmBtn.onclick = () => {
                onConfirm();
                closeConfirmationModal();
            };
            
            document.getElementById('confirmation-modal-overlay').classList.add('active');
        }

        function closeConfirmationModal() {
            document.getElementById('confirmation-modal-overlay').classList.remove('active');
        }

        // --- UNDO/REDO (BASE) ---
        function saveStateSnapshot() {
            const snapshot = {
                areas: JSON.parse(JSON.stringify(state.areas)),
                nodes: JSON.parse(JSON.stringify(state.nodes)),
                zoom: state.zoom
            };
            
            state.history.past.push(snapshot);
            
            if (state.history.past.length > state.history.maxSize) {
                state.history.past.shift();
            }
            
            state.history.future = [];
        }

        function undo() {
            if (state.history.past.length === 0) return;
            
            const currentState = {
                areas: JSON.parse(JSON.stringify(state.areas)),
                nodes: JSON.parse(JSON.stringify(state.nodes)),
                zoom: state.zoom
            };
            
            state.history.future.push(currentState);
            
            const previousState = state.history.past.pop();
            state.areas = previousState.areas;
            state.nodes = previousState.nodes;
            state.zoom = previousState.zoom;
            
            renderAll();
        }

        function redo() {
            if (state.history.future.length === 0) return;
            
            const currentState = {
                areas: JSON.parse(JSON.stringify(state.areas)),
                nodes: JSON.parse(JSON.stringify(state.nodes)),
                zoom: state.zoom
            };
            
            state.history.past.push(currentState);
            
            const nextState = state.history.future.pop();
            state.areas = nextState.areas;
            state.nodes = nextState.nodes;
            state.zoom = nextState.zoom;
            
            renderAll();
        }

        // Sistema de detección de doble click
        let lastClickTime = 0;
        let lastClickNodeId = null;
        let dragOccurred = false;

        function handleNodeClick(e, nodeId) {
            // Si hubo drag, no procesar como click
            if (dragOccurred) {
                dragOccurred = false;
                return;
            }
            
            const now = Date.now();
            const timeDiff = now - lastClickTime;
            
            // Si es doble click (menos de 400ms entre clicks en el mismo nodo)
            if (timeDiff < 400 && lastClickNodeId === nodeId) {
                // Cancelar drag
                interaction = null;
                // Abrir modal
                openPropertiesModal(nodeId);
                // Reset
                lastClickTime = 0;
                lastClickNodeId = null;
            } else {
                // Primer click
                lastClickTime = now;
                lastClickNodeId = nodeId;
            }
        }

        function startInteraction(e, nodeId, mode) {
            e.stopPropagation();
            const node = state.nodes.find(n => n.id === nodeId);
            if (!node) return;
            
            selectNode(nodeId);
            
            interaction = {
                id: nodeId,
                mode: mode,
                startX: e.clientX,
                startY: e.clientY,
                initialStart: node.startTime,
                initialEnd: node.endTime
            };
            
            renderTimeline();
        }

        function handleMouseMove(e) {
            if (!interaction) return;

            const deltaX = e.clientX - interaction.startX;
            const deltaY = e.clientY - interaction.startY;
            
            // Requerir movimiento mínimo de 5px para iniciar drag (evita clicks accidentales)
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            if (distance < 5) return;
            
            // Marcar que hubo drag
            dragOccurred = true;
            
            const deltaMinutes = deltaX / state.zoom;
            const nodeIndex = state.nodes.findIndex(n => n.id === interaction.id);
            if (nodeIndex === -1) return;
            
            const n = state.nodes[nodeIndex];
            let newStart = n.startTime;
            let newEnd = n.endTime;
            const minDur = 15;

            if (interaction.mode === 'move') {
                newStart = interaction.initialStart + deltaMinutes;
                newStart = Math.round(newStart / SNAP_MINUTES) * SNAP_MINUTES;
                const dur = interaction.initialEnd - interaction.initialStart;
                
                if (newStart < 0) newStart = 0;
                if (newStart + dur > TOTAL_MINUTES) newStart = TOTAL_MINUTES - dur;
                newEnd = newStart + dur;

                const container = document.getElementById('scroll-container');
                const rect = container.getBoundingClientRect();
                if (e.clientY > rect.top + 40 && e.clientY < rect.bottom) {
                    const scrollY = container.scrollTop;
                    const relativeY = e.clientY - rect.top + scrollY - 40;
                    
                    // Calcular área y subcarril
                    let accumulatedHeight = 0;
                    let targetAreaId = n.areaId;
                    let targetSublane = n.sublane || 0;
                    
                    for (let i = 0; i < state.areas.length; i++) {
                        const area = state.areas[i];
                        const sublaneCount = getAreaSublaneCount(area.id);
                        const sublaneHeight = 60;
                        const areaHeight = Math.max(sublaneCount * sublaneHeight + 16, 76);
                        
                        if (relativeY >= accumulatedHeight && relativeY < accumulatedHeight + areaHeight) {
                            targetAreaId = area.id;
                            // Calcular subcarril dentro del área
                            const yInArea = relativeY - accumulatedHeight;
                            targetSublane = Math.floor(yInArea / sublaneHeight);
                            if (targetSublane >= sublaneCount) targetSublane = sublaneCount - 1;
                            if (targetSublane < 0) targetSublane = 0;
                            break;
                        }
                        accumulatedHeight += areaHeight + 4; // +4 para el espacio entre áreas
                    }
                    
                    // Marcar como posición manual si cambió de subcarril
                    if (n.areaId !== targetAreaId || n.sublane !== targetSublane) {
                        n.manualSublane = true;
                    }
                    n.areaId = targetAreaId;
                    n.sublane = targetSublane;
                }
            } else if (interaction.mode === 'resize-left') {
                newStart = interaction.initialStart + deltaMinutes;
                newStart = Math.round(newStart / SNAP_MINUTES) * SNAP_MINUTES;
                if (newStart < 0) newStart = 0;
                if (newStart > n.endTime - minDur) newStart = n.endTime - minDur;
            } else if (interaction.mode === 'resize-right') {
                newEnd = interaction.initialEnd + deltaMinutes;
                newEnd = Math.round(newEnd / SNAP_MINUTES) * SNAP_MINUTES;
                if (newEnd > TOTAL_MINUTES) newEnd = TOTAL_MINUTES;
                if (newEnd < n.startTime + minDur) newEnd = n.startTime + minDur;
            }

            n.startTime = newStart;
            n.endTime = newEnd;
            
            renderTimeline();
            // Actualizar modal si está abierto
            if(interaction.mode === 'resize-left' || interaction.mode === 'resize-right' || interaction.mode === 'move'){
                const modalOverlay = document.getElementById('properties-modal-overlay');
                if (modalOverlay.classList.contains('active')) {
                    openPropertiesModal(state.selectedNodeId);
                }
            }
        }

        function handleMouseUp() {
            if (interaction) {
                interaction = null;
                renderAll(); 
            }
        }

        function selectNode(id) {
            state.selectedNodeId = id;
            renderAll();
        }

        function changeZoom(delta) {
            let newZoom = state.zoom + delta;
            if (newZoom < 0.5) newZoom = 0.5;
            if (newZoom > 10) newZoom = 10;
            state.zoom = newZoom;
            renderAll();
        }

        function addArea() {
            state.areas.push({
                id: 'a' + Date.now(),
                name: 'Nueva Área',
                color: '#94a3b8',
                order: state.areas.length + 1
            });
            renderAll();
            showToast("Área añadida");
        }

        function updateArea(id, name) {
            const area = state.areas.find(a => a.id === id);
            if (area) area.name = name;
            renderAll();
        }

        function updateAreaColor(id, color) {
            const area = state.areas.find(a => a.id === id);
            if (area) area.color = color;
            renderAll();
        }

        function removeArea(id) {
            state.areas = state.areas.filter(a => a.id !== id);
            state.nodes = state.nodes.filter(n => n.areaId !== id);
            if (state.selectedNodeId && !state.nodes.find(n => n.id === state.selectedNodeId)) {
                state.selectedNodeId = null;
            }
            renderAll();
            showToast("Área eliminada");
        }

        // --- MENÚ CONTEXTUAL ---
        function showContextMenu(e, nodeId) {
            e.preventDefault();
            e.stopPropagation();
            
            const menu = document.getElementById('context-menu');
            const node = state.nodes.find(n => n.id === nodeId);
            if (!node) return;
            
            selectNode(nodeId);
            
            const canPaste = state.copiedNode !== null;
            
            menu.innerHTML = `
                <div class="context-menu-item" onclick="openPropertiesModal('${nodeId}'); hideContextMenu();">
                    <i class="ph ph-note-pencil"></i>
                    <span>Editar</span>
                    <span class="ml-auto text-xs text-slate-400">Doble click</span>
                </div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item" onclick="copyNode(); hideContextMenu();">
                    <i class="ph ph-copy"></i>
                    <span>Copiar</span>
                    <span class="ml-auto text-xs text-slate-400">Ctrl+C</span>
                </div>
                ${canPaste ? `
                <div class="context-menu-item" onclick="pasteNode(); hideContextMenu();">
                    <i class="ph ph-clipboard"></i>
                    <span>Pegar</span>
                    <span class="ml-auto text-xs text-slate-400">Ctrl+V</span>
                </div>` : ''}
                <div class="context-menu-item" onclick="duplicateNode('${nodeId}'); hideContextMenu();">
                    <i class="ph ph-copy-simple"></i>
                    <span>Duplicar</span>
                </div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item danger" onclick="deleteSelectedNode(); hideContextMenu();">
                    <i class="ph ph-trash"></i>
                    <span>Eliminar</span>
                    <span class="ml-auto text-xs text-slate-400">Del</span>
                </div>
            `;
            
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.remove('hidden');
        }

        function hideContextMenu() {
            const menu = document.getElementById('context-menu');
            menu.classList.add('hidden');
        }

        function addNode() {
            if (state.areas.length === 0) {
                showToast("Por favor, crea un Área primero.");
                return;
            }
            const newNode = {
                id: 'n' + Date.now(),
                name: 'Nueva Actividad',
                startTime: 480,
                endTime: 540,
                areaId: state.areas[0].id,
                color: '#ffffff',
                description: '',
                customFields: [],
                sublane: 0
            };
            state.nodes.push(newNode);
            state.selectedNodeId = newNode.id;
            renderAll();
            showToast("Actividad creada");
            // Abrir modal automáticamente
            setTimeout(() => openPropertiesModal(newNode.id), 100);
        }

        function updateNodeProp(prop, value, isTime = false) {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            node[prop] = isTime ? parseTime(value) : value;
            
            // Solo actualizar timeline y guardar, NO renderAll para mantener focus
            renderTimeline();
            saveData();
            
            // Si se cambió el color, actualizar el modal para reflejar selección visual
            if (prop === 'color') {
                const modalOverlay = document.getElementById('properties-modal-overlay');
                if (modalOverlay.classList.contains('active')) {
                    openPropertiesModal(state.selectedNodeId);
                }
            }
        }

        function deleteSelectedNode() {
            state.nodes = state.nodes.filter(n => n.id !== state.selectedNodeId);
            state.selectedNodeId = null;
            renderAll();
            showToast("Actividad eliminada");
        }

        function addCustomField() {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            if(!node.customFields) node.customFields = [];
            node.customFields.push({ id: 'cf' + Date.now(), key: 'Nueva Propiedad', value: '' });
            
            // Actualizar modal sin perder focus
            openPropertiesModal(state.selectedNodeId);
            saveData();
        }

        function updateCustomField(fieldId, prop, value) {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            const field = node.customFields.find(cf => cf.id === fieldId);
            if(field) field[prop] = value;
            saveData(); 
        }

        function removeCustomField(fieldId) {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            node.customFields = node.customFields.filter(cf => cf.id !== fieldId);
            
            // Actualizar modal sin perder focus
            openPropertiesModal(state.selectedNodeId);
            saveData();
        }

        function exportToJson() {
            showLoading("Compilando datos del proyecto...");
            
            setTimeout(() => {
                const dataToExport = {
                    version: '1.0',
                    timestamp: new Date().toISOString(),
                    areas: state.areas,
                    nodes: state.nodes,
                    settings: { zoom: state.zoom }
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToExport, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `chronomap-${new Date().getTime()}.json`);
                document.body.appendChild(downloadAnchorNode); 
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                
                hideLoading();
                showToast("Proyecto exportado exitosamente");
            }, 600);
        }

        function importFromJson(e) {
            const file = e.target.files[0];
            if (!file) return;

            showLoading("Analizando e importando archivo...");

            const reader = new FileReader();
            reader.onload = (event) => {
                setTimeout(() => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.areas && importedData.nodes) {
                            state.areas = importedData.areas;
                            state.nodes = importedData.nodes;
                            if (importedData.settings && importedData.settings.zoom) {
                                state.zoom = importedData.settings.zoom;
                            }
                            state.selectedNodeId = null;
                            renderAll();
                            hideLoading();
                            showToast("Proyecto importado exitosamente");
                        } else {
                            hideLoading();
                            showToast("El archivo no tiene el formato de ChronoMap.");
                        }
                    } catch (error) {
                        hideLoading();
                        showToast("Error: JSON inválido o corrupto.");
                    }
                }, 600);
                e.target.value = null;
            };
            reader.readAsText(file);
        }

        function exportToImage() {
            showLoading("Renderizando imagen de alta calidad... Esto puede tardar unos segundos.");
            
            setTimeout(() => {
                const prevSelected = state.selectedNodeId;
                selectNode(null);

                const elementToCapture = document.getElementById('timeline-wrapper');
                
                const originalBackground = elementToCapture.style.backgroundColor;
                elementToCapture.style.backgroundColor = '#f8fafc';

                html2canvas(elementToCapture, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#f8fafc'
                }).then(canvas => {
                    elementToCapture.style.backgroundColor = originalBackground;
                    if(prevSelected) selectNode(prevSelected);

                    const imgData = canvas.toDataURL('image/png');
                    const downloadLink = document.createElement('a');
                    downloadLink.href = imgData;
                    downloadLink.download = `chronomap-timeline-${new Date().getTime()}.png`;
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    hideLoading();
                    showToast("Línea de tiempo guardada como imagen.");
                }).catch(err => {
                    console.error("Error capturando imagen:", err);
                    if(prevSelected) selectNode(prevSelected);
                    hideLoading();
                    showToast("Hubo un problema al generar la imagen.");
                });
            }, 800);
        }

        // Arrancar aplicación
        init();
    </script>
</body>
</html>
