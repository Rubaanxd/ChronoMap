        function closePropertiesModal() { document.getElementById('properties-modal-overlay').classList.remove('active'); }
        function togglePanel() { state.isPanelCollapsed = !state.isPanelCollapsed; localStorage.setItem('chronomap_panel_collapsed_vanilla', state.isPanelCollapsed.toString()); renderAll(); }
        
        // Funciones de búsqueda y filtros
        function handleSearch(query) {
            state.searchQuery = query.toLowerCase().trim();
            const clearBtn = document.getElementById('clear-search-btn');
            if (state.searchQuery) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            renderTimeline();
        }
        
        function clearSearch() {
            state.searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search-btn').classList.add('hidden');
            renderTimeline();
        }
        
        function toggleFiltersPanel() {
            const panel = document.getElementById('filters-panel');
            const btn = document.getElementById('filters-toggle');
            
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.classList.add('bg-blue-50', 'border-blue-300', 'text-blue-700');
                renderAreaFilters();
            } else {
                panel.classList.add('hidden');
                btn.classList.remove('bg-blue-50', 'border-blue-300', 'text-blue-700');
            }
        }
        
        function renderAreaFilters() {
            const container = document.getElementById('area-filters');
            let html = state.areas.map(area => `
                <label class="flex items-center text-sm text-slate-700 hover:bg-slate-50 p-1.5 rounded cursor-pointer">
                    <input type="checkbox" value="${area.id}" onchange="toggleAreaFilter('${area.id}', this.checked)" class="mr-2 rounded border-slate-300" ${state.filters.areas.includes(area.id) ? 'checked' : ''}>
                    <div class="w-3 h-3 rounded-full mr-2" style="background-color: ${area.color}"></div>
                    ${area.name}
                </label>
            `).join('');
            container.innerHTML = html || '<div class="text-xs text-slate-400 italic p-2">Sin áreas</div>';
        }
        
        function toggleAreaFilter(areaId, checked) {
            if (checked) {
                if (!state.filters.areas.includes(areaId)) {
                    state.filters.areas.push(areaId);
                }
            } else {
                state.filters.areas = state.filters.areas.filter(id => id !== areaId);
            }
            updateActiveFiltersCount();
            renderTimeline();
        }
        
        function toggleStatusFilter(status, checked) {
            if (checked) {
                if (!state.filters.statuses.includes(status)) {
                    state.filters.statuses.push(status);
                }
            } else {
                state.filters.statuses = state.filters.statuses.filter(s => s !== status);
            }
            updateActiveFiltersCount();
            renderTimeline();
        }
        
        function togglePriorityFilter(priority, checked) {
            if (checked) {
                if (!state.filters.priorities.includes(priority)) {
                    state.filters.priorities.push(priority);
                }
            } else {
                state.filters.priorities = state.filters.priorities.filter(p => p !== priority);
            }
            updateActiveFiltersCount();
            renderTimeline();
        }
        
        function clearAllFilters() {
            state.filters = {
                areas: [],
                statuses: [],
                priorities: [],
                tags: []
            };
            state.searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search-btn').classList.add('hidden');
            
            // Desmarcar todos los checkboxes
            document.querySelectorAll('#filters-panel input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            updateActiveFiltersCount();
            renderTimeline();
        }
        
        function updateActiveFiltersCount() {
            const count = state.filters.areas.length + state.filters.statuses.length + state.filters.priorities.length + state.filters.tags.length;
            const badge = document.getElementById('active-filters-badge');
            
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }
        
        function filterNodes(nodes) {
            return nodes.filter(node => {
                // Búsqueda por nombre
                if (state.searchQuery && !node.name.toLowerCase().includes(state.searchQuery)) {
                    return false;
                }
                
                // Filtro por área
                if (state.filters.areas.length > 0 && !state.filters.areas.includes(node.areaId)) {
                    return false;
                }
                
                // Filtro por estado
                if (state.filters.statuses.length > 0 && !state.filters.statuses.includes(node.status || 'pending')) {
                    return false;
                }
                
                // Filtro por prioridad
                if (state.filters.priorities.length > 0 && !state.filters.priorities.includes(node.priority || 'medium')) {
                    return false;
                }
                
                return true;
            });
        }
        
        function handleZoomScroll(e) { 
            if (!e.ctrlKey) return; 
            e.preventDefault(); 
            
            const container = document.getElementById('scroll-container');
            const rect = container.getBoundingClientRect();
            
            // Posición del mouse relativa al contenedor
            const mouseX = e.clientX - rect.left;
            
            // Posición de scroll actual
            const scrollLeft = container.scrollLeft;
            
            // Posición absoluta del mouse en el contenido
            const mousePositionInContent = scrollLeft + mouseX;
            
            // Calcular la posición relativa (0-1) en el contenido actual
            const relativePosition = mousePositionInContent / (TOTAL_MINUTES * state.zoom);
            
            // Aplicar zoom
            const oldZoom = state.zoom;
            const zoomDelta = -Math.sign(e.deltaY) * 0.2;
            state.zoom = Math.max(0.5, Math.min(10, state.zoom + zoomDelta));
            
            // Renderizar con nuevo zoom
            renderAll();
            
            // Calcular nueva posición de scroll para mantener el mouse en el mismo lugar
            const newContentWidth = TOTAL_MINUTES * state.zoom;
            const newMousePositionInContent = relativePosition * newContentWidth;
            const newScrollLeft = newMousePositionInContent - mouseX;
            
            // Aplicar nuevo scroll
            container.scrollLeft = newScrollLeft;
        }
        
        function changeZoom(delta) {
            const container = document.getElementById('scroll-container');
            const scrollLeft = container.scrollLeft;
            const containerWidth = container.clientWidth;
            
            // Calcular punto central del viewport
            const centerPosition = scrollLeft + (containerWidth / 2);
            const relativePosition = centerPosition / (TOTAL_MINUTES * state.zoom);
            
            // Aplicar zoom
            state.zoom = Math.max(0.5, Math.min(10, state.zoom + delta));
            
            // Renderizar
            renderAll();
            
            // Mantener centrado
            const newContentWidth = TOTAL_MINUTES * state.zoom;
            const newCenterPosition = relativePosition * newContentWidth;
            container.scrollLeft = newCenterPosition - (containerWidth / 2);
        }
        
        function clearCanvas() { if (state.nodes.length === 0) return showToast('📦 El lienzo ya está vacío'); showConfirmationModal('¿Limpiar lienzo?', 'Se eliminarán todas las actividades.', () => { state.nodes = []; state.selectedNodeId = null; renderAll(); showToast('✅ Lienzo limpiado'); }); }
        
        function showConfirmationModal(title, message, onConfirm) {
            document.getElementById('confirmation-title').innerText = title;
            document.getElementById('confirmation-message').innerText = message;
            document.getElementById('confirmation-confirm-btn').onclick = () => { onConfirm(); closeConfirmationModal(); };
            document.getElementById('confirmation-modal-overlay').classList.add('active');
        }
        function closeConfirmationModal() { document.getElementById('confirmation-modal-overlay').classList.remove('active'); }

        let lastClickTime = 0; let lastClickNodeId = null; let dragOccurred = false;
        function handleNodeClick(e, nodeId) {
            if (dragOccurred) { dragOccurred = false; return; }
            // Deshabilitar doble click en modo readonly
            if (state.viewMode !== 'edit') return;
            
            const now = Date.now();
            if (now - lastClickTime < 400 && lastClickNodeId === nodeId) {
                interaction = null; openPropertiesModal(nodeId); lastClickTime = 0; lastClickNodeId = null;
            } else { lastClickTime = now; lastClickNodeId = nodeId; }
        }

        function startInteraction(e, nodeId, mode) {
            // Deshabilitar en modo readonly
            if (state.viewMode !== 'edit') return;
            
            e.stopPropagation();
            const node = state.nodes.find(n => n.id === nodeId);
            if (!node) return;
            selectNode(nodeId);
            interaction = { id: nodeId, mode: mode, startX: e.clientX, startY: e.clientY, initialStart: node.startTime, initialEnd: node.endTime };
            renderTimeline();
        }

        function handleMouseMove(e) {
            if (!interaction) return;
            const deltaX = e.clientX - interaction.startX;
            const deltaY = e.clientY - interaction.startY;
            if (Math.sqrt(deltaX * deltaX + deltaY * deltaY) < 5) return;
            dragOccurred = true;
            
            const n = state.nodes.find(n => n.id === interaction.id);
            if (!n) return;
            
            const minDur = 15;
            const deltaMinutes = deltaX / state.zoom;
            let newStart = n.startTime, newEnd = n.endTime;

            if (interaction.mode === 'move') {
                newStart = Math.round((interaction.initialStart + deltaMinutes) / SNAP_MINUTES) * SNAP_MINUTES;
                const dur = interaction.initialEnd - interaction.initialStart;
                if (newStart < 0) newStart = 0;
                if (newStart + dur > TOTAL_MINUTES) newStart = TOTAL_MINUTES - dur;
                newEnd = newStart + dur;

                const rect = document.getElementById('scroll-container').getBoundingClientRect();
                if (e.clientY > rect.top + 40 && e.clientY < rect.bottom) {
                    const relativeY = e.clientY - rect.top + document.getElementById('scroll-container').scrollTop - 40;
                    let accumulated = 0, targetArea = n.areaId, targetSublane = n.sublane || 0;
                    for (const area of state.areas) {
                        const sCount = getAreaSublaneCount(area.id);
                        const aHeight = Math.max(sCount * 60 + 16, 76);
                        if (relativeY >= accumulated && relativeY < accumulated + aHeight) {
                            targetArea = area.id;
                            targetSublane = Math.max(0, Math.min(sCount - 1, Math.floor((relativeY - accumulated) / 60)));
                            break;
                        }
                        accumulated += aHeight + 4;
                    }
                    if (n.areaId !== targetArea || n.sublane !== targetSublane) n.manualSublane = true;
                    n.areaId = targetArea; n.sublane = targetSublane;
                }
            } else if (interaction.mode === 'resize-left') {
                newStart = Math.round((interaction.initialStart + deltaMinutes) / SNAP_MINUTES) * SNAP_MINUTES;
                if (newStart < 0) newStart = 0;
                if (newStart > n.endTime - minDur) newStart = n.endTime - minDur;
            } else if (interaction.mode === 'resize-right') {
                newEnd = Math.round((interaction.initialEnd + deltaMinutes) / SNAP_MINUTES) * SNAP_MINUTES;
                if (newEnd > TOTAL_MINUTES) newEnd = TOTAL_MINUTES;
                if (newEnd < n.startTime + minDur) newEnd = n.startTime + minDur;
            }

            n.startTime = newStart; n.endTime = newEnd;
            renderTimeline();
            
            // Actualizar modal si está visible para ver el conflicto en vivo
            if (document.getElementById('properties-modal-overlay').classList.contains('active')) {
                openPropertiesModal(n.id);
            }
        }

        function handleMouseUp() { if (interaction) { interaction = null; renderAll(); } }
        function selectNode(id) { state.selectedNodeId = id; renderAll(); }
        function addArea() { state.areas.push({ id: 'a' + Date.now(), name: 'Nueva Área', color: '#94a3b8', order: state.areas.length + 1 }); renderAll(); }
        function updateArea(id, name) { const a = state.areas.find(a => a.id === id); if (a) { a.name = name; renderAll(); } }
        function updateAreaColor(id, color) { const a = state.areas.find(a => a.id === id); if (a) { a.color = color; renderAll(); } }
        
        function removeArea(id) {
            state.areas = state.areas.filter(a => a.id !== id);
            const nodesToRemove = state.nodes.filter(n => n.areaId === id).map(n => n.id);
            state.nodes = state.nodes.filter(n => n.areaId !== id);
            // Limpiar dependencias huerfanas
            state.nodes.forEach(n => {
                if(n.dependencies) n.dependencies = n.dependencies.filter(dep => !nodesToRemove.includes(dep));
            });
            if (nodesToRemove.includes(state.selectedNodeId)) state.selectedNodeId = null;
            renderAll(); showToast("Área eliminada");
        }

        function showContextMenu(e, nodeId) {
            e.preventDefault(); e.stopPropagation();
            selectNode(nodeId);
            const menu = document.getElementById('context-menu');
            const canPaste = state.copiedNode !== null;
            menu.innerHTML = `
                <div class="context-menu-item" onclick="openPropertiesModal('${nodeId}'); hideContextMenu();"><i class="ph ph-note-pencil"></i><span>Editar</span><span class="ml-auto text-xs text-slate-400">Doble clic</span></div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item" onclick="copyNode(); hideContextMenu();"><i class="ph ph-copy"></i><span>Copiar</span><span class="ml-auto text-xs text-slate-400">Ctrl+C</span></div>
                ${canPaste ? `<div class="context-menu-item" onclick="pasteNode(); hideContextMenu();"><i class="ph ph-clipboard"></i><span>Pegar</span><span class="ml-auto text-xs text-slate-400">Ctrl+V</span></div>` : ''}
                <div class="context-menu-item" onclick="duplicateNode('${nodeId}'); hideContextMenu();"><i class="ph ph-copy-simple"></i><span>Duplicar</span></div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item danger" onclick="deleteSelectedNode(); hideContextMenu();"><i class="ph ph-trash"></i><span>Eliminar</span><span class="ml-auto text-xs text-slate-400">Del</span></div>`;
            menu.style.left = `${e.clientX}px`; menu.style.top = `${e.clientY}px`; menu.classList.remove('hidden');
        }
        function hideContextMenu() { document.getElementById('context-menu').classList.add('hidden'); }

        function addNode() {
            if (!state.areas.length) return showToast("Por favor, crea un Área primero.");
            const newNode = { 
                id: 'n' + Date.now(), 
                name: 'Nueva Actividad', 
                startTime: 480, 
                endTime: 540, 
                areaId: state.areas[0].id, 
                color: '#ffffff', 
                description: '', 
                customFields: [], 
                sublane: 0, 
                dependencies: [],
                status: 'pending',
                priority: 'medium',
                tags: []
            };
            state.nodes.push(newNode); state.selectedNodeId = newNode.id; renderAll(); showToast("Actividad creada");
            setTimeout(() => openPropertiesModal(newNode.id), 100);
        }

        function updateNodeProp(prop, value, isTime = false) {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            node[prop] = isTime ? parseTime(value) : value;
            renderTimeline(); saveData();
            if (prop === 'color' && document.getElementById('properties-modal-overlay').classList.contains('active')) openPropertiesModal(state.selectedNodeId);
        }

        function deleteSelectedNode() {
            const delId = state.selectedNodeId;
            state.nodes = state.nodes.filter(n => n.id !== delId);
            // Remover dependencias de otras tareas
            state.nodes.forEach(n => {
                if (n.dependencies) n.dependencies = n.dependencies.filter(id => id !== delId);
            });
            state.selectedNodeId = null; renderAll(); showToast("Actividad eliminada");
        }

        function addCustomField() {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            node.customFields.push({ id: 'cf' + Date.now(), key: 'Nueva Propiedad', value: '' });
            openPropertiesModal(state.selectedNodeId); saveData();
        }
        function updateCustomField(fieldId, prop, value) {
            const field = state.nodes.find(n => n.id === state.selectedNodeId)?.customFields.find(cf => cf.id === fieldId);
            if(field) { field[prop] = value; saveData(); }
        }
        function removeCustomField(fieldId) {
            const node = state.nodes.find(n => n.id === state.selectedNodeId);
            if (!node) return;
            node.customFields = node.customFields.filter(cf => cf.id !== fieldId);
            openPropertiesModal(state.selectedNodeId); saveData();
        }

        function exportToJson() {
            showLoading("Compilando datos...");
            setTimeout(() => {
                const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ version: '1.0', timestamp: new Date().toISOString(), areas: state.areas, nodes: state.nodes, settings: { zoom: state.zoom } }, null, 2));
                const a = document.createElement('a'); a.href = data; a.download = `chronomap-${Date.now()}.json`; document.body.appendChild(a); a.click(); a.remove();
                hideLoading(); showToast("Exportado exitosamente");
            }, 600);
        }

        function importFromJson(e) {
            const file = e.target.files[0]; if (!file) return;
            showLoading("Importando...");
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.areas && data.nodes) {
                            state.areas = data.areas; state.nodes = data.nodes;
                            // Asegurar arrays de dependencias viejos
                            state.nodes.forEach(n => { if(!n.dependencies) n.dependencies = []; });
                            if (data.settings?.zoom) state.zoom = data.settings.zoom;
                            state.selectedNodeId = null; renderAll(); showToast("Importado exitosamente");
                        } else throw new Error();
                    } catch (err) { showToast("Error: Archivo inválido."); }
                    hideLoading();
                }, 600);
                e.target.value = null;
            };
            reader.readAsText(file);
        }

        function exportToImage() {
            showLoading("Renderizando imagen...");
            setTimeout(() => {
                const prev = state.selectedNodeId; selectNode(null);
                const el = document.getElementById('timeline-wrapper');
                const origBg = el.style.backgroundColor; 
                const origPadding = el.style.padding;
                el.style.backgroundColor = '#f8fafc';
                el.style.padding = '20px'; // Añadir padding para evitar cortes
                
                html2canvas(el, { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false, 
                    backgroundColor: '#f8fafc',
                    windowWidth: el.scrollWidth + 40,
                    windowHeight: el.scrollHeight + 40
                }).then(canvas => {
                    el.style.backgroundColor = origBg; 
                    el.style.padding = origPadding;
                    if(prev) selectNode(prev);
                    const a = document.createElement('a'); 
                    a.href = canvas.toDataURL('image/png'); 
                    a.download = `chronomap-${Date.now()}.png`; 
                    document.body.appendChild(a); 
                    a.click(); 
                    a.remove();
                    hideLoading(); 
                    showToast("✅ Guardado como imagen.");
                }).catch(() => { 
                    if(prev) selectNode(prev); 
                    el.style.backgroundColor = origBg;
                    el.style.padding = origPadding;
                    hideLoading(); 
                    showToast("❌ Error al generar imagen."); 
                });
            }, 800);
        }
        
        function shareWithLink() {
            showLoading("Generando link...");
            setTimeout(() => {
                try {
                    // Crear objeto con datos mínimos
                    const shareData = {
                        v: '1.0', // version
                        a: state.areas.map(area => ({
                            i: area.id,
                            n: area.name,
                            c: area.color
                        })),
                        n: state.nodes.map(node => ({
                            i: node.id,
                            n: node.name,
                            s: node.startTime,
                            e: node.endTime,
                            a: node.areaId,
                            c: node.color,
                            d: node.description || '',
                            st: node.status || 'pending',
                            p: node.priority || 'medium',
                            dp: node.dependencies || []
                        }))
                    };
                    
                    // Comprimir a Base64
                    const jsonStr = JSON.stringify(shareData);
                    const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
                    
                    // Crear URL
                    const url = `${window.location.origin}${window.location.pathname}?data=${base64}&view=readonly`;
                    
                    // Copiar al portapapeles
                    navigator.clipboard.writeText(url).then(() => {
                        hideLoading();
                        showToast("✅ Link copiado al portapapeles");
                        
                        // Mostrar modal con el link
                        showShareModal(url);
                    }).catch(() => {
                        hideLoading();
                        showToast("⚠️ No se pudo copiar. Usa el modal.");
                        showShareModal(url);
                    });
                } catch (err) {
                    hideLoading();
                    showToast("❌ Error al generar link");
                    console.error(err);
                }
            }, 300);
        }
        
        function showShareModal(url) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-2xl w-full mx-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="ph ph-share-network text-blue-600"></i>
                            Compartir Timeline
                        </h3>
                        <button onclick="this.closest('.fixed').remove()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                            <i class="ph ph-x text-slate-500"></i>
                        </button>
                    </div>
                    <p class="text-sm text-slate-600 mb-4">Comparte este link para que otros vean tu timeline en modo solo lectura:</p>
                    <div class="flex gap-2">
                        <input type="text" value="${url}" readonly class="flex-1 text-sm p-3 bg-slate-50 border border-slate-200 rounded-lg font-mono text-slate-700" id="share-url-input" />
                        <button onclick="navigator.clipboard.writeText('${url}'); showToast('✅ Copiado')" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors flex items-center gap-2">
                            <i class="ph ph-copy"></i> Copiar
                        </button>
                    </div>
                    <div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                        <p class="text-xs text-blue-800 flex items-start gap-2">
                            <i class="ph ph-info text-lg shrink-0"></i>
                            <span>El link contiene todos los datos comprimidos. Los usuarios podrán ver el timeline pero no editarlo.</span>
                        </p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Seleccionar el texto automáticamente
            setTimeout(() => {
                const input = document.getElementById('share-url-input');
                if (input) input.select();
            }, 100);
            
            // Cerrar al hacer click fuera
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }
        
        function exportToHtml() {
            showLoading("Generando HTML...");
            setTimeout(() => {
                try {
                    // Obtener el HTML actual
                    const htmlContent = document.documentElement.outerHTML;
                    
                    // Inyectar datos en el HTML
                    const dataScript = `
                        <script>
                            // Auto-cargar datos al abrir el HTML
                            window.addEventListener('DOMContentLoaded', function() {
                                const preloadedData = ${JSON.stringify({ areas: state.areas, nodes: state.nodes, zoom: state.zoom })};
                                if (typeof state !== 'undefined') {
                                    state.areas = preloadedData.areas;
                                    state.nodes = preloadedData.nodes;
                                    state.zoom = preloadedData.zoom || 2;
                                    state.viewMode = 'readonly';
                                    renderAll();
                                    applyViewMode();
                                }
                            });
                        <\/script>
                    `;
                    
                    // Insertar el script antes del cierre de body
                    const modifiedHtml = htmlContent.replace('</body>', dataScript + '</body>');
                    
                    // Crear blob y descargar
                    const blob = new Blob([modifiedHtml], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `chronomap-${Date.now()}.html`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                    
                    hideLoading();
                    showToast("✅ HTML exportado exitosamente");
                } catch (err) {
                    hideLoading();
                    showToast("❌ Error al exportar HTML");
                    console.error(err);
                }
            }, 600);
        }

        init();
    </script>
</body>
</html>
